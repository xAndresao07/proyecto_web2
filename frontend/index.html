<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Gestión de Citas - ULEAM</title>
  <style>
    body { font-family: sans-serif; background: #0f1419; color: #e6edf3; padding: 20px; }
    .panel { background: #1a2029; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
    input, select { display: block; margin: 10px 0; padding: 8px; width: 100%; max-width: 300px; background: #0d1117; border: 1px solid #2d333b; color: #fff; }
    table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    th, td { border-bottom: 1px solid #2d333b; padding: 12px; text-align: left; }
    button { cursor: pointer; padding: 8px 15px; margin-right: 5px; }
  </style>
</head>
<body>
  <h1>Citas Técnicas</h1>

  <div class="panel">
    <strong>Login</strong>
    <input id="email" placeholder="Email">
    <input id="pass" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
  </div>

  <div class="panel">
    <input type="hidden" id="cita-id">
    <input id="sol" placeholder="Solicitante ID">
    <input id="tec" placeholder="Tecnico ID">
    <input id="punto" placeholder="Punto Encuentro">
    <input id="hora" placeholder="Hora (HH:mm)">
    <select id="estado">
        <option value="pendiente">Pendiente</option>
        <option value="completada">Completada</option>
        <option value="cancelada">Cancelada</option>
    </select>
    <button onclick="guardar()">Guardar Cita</button>
  </div>

  <table>
    <thead><tr><th>ID</th><th>Solicitante</th><th>Técnico</th><th>Hora</th><th>Lugar</th><th>Estado</th><th>Acciones</th></tr></thead>
    <tbody id="tabla"></tbody>
  </table>

  <script>
    const API = "http://localhost:8080/api/v1/citas";
    const AUTH = "http://localhost:8080/api/v1/auth/login";

    async function login() {
      const res = await fetch(AUTH, {
        method: "POST",
        body: JSON.stringify({ email: document.getElementById("email").value, password: document.getElementById("pass").value })
      });
      const data = await res.json();
      if (data.token) {
        localStorage.setItem("token", data.token);
        alert("Login exitoso");
        listar();
      } else { alert("Login fallido"); }
    }

    async function listar() {
      const res = await fetch(API, { headers: { "Authorization": "Bearer " + localStorage.getItem("token") } });
      const data = await res.json();
      const tbody = document.getElementById("tabla");
      tbody.innerHTML = "";
      (data || []).forEach(c => {
        tbody.innerHTML += `<tr>
          <td>${c.id}</td><td>${c.solicitante_id}</td><td>${c.tecnico_id}</td>
          <td>${c.hora_acordada}</td><td>${c.punto_encuentro}</td><td>${c.estado}</td>
          <td>
            <button onclick='editar(${JSON.stringify(c)})'>Editar</button>
            <button onclick="borrar(${c.id})">Borrar</button>
          </td>
        </tr>`;
      });
    }

    async function guardar() {
      const id = document.getElementById("cita-id").value;
      const body = {
        solicitante_id: document.getElementById("sol").value,
        tecnico_id: document.getElementById("tec").value,
        punto_encuentro: document.getElementById("punto").value,
        hora_acordada: document.getElementById("hora").value,
        estado: document.getElementById("estado").value
      };
      await fetch(id ? `${API}/${id}` : API, {
        method: id ? "PUT" : "POST",
        headers: { "Content-Type": "application/json", "Authorization": "Bearer " + localStorage.getItem("token") },
        body: JSON.stringify(body)
      });
      document.getElementById("cita-id").value = "";
      listar();
    }

    async function borrar(id) {
      await fetch(`${API}/${id}`, { method: "DELETE", headers: { "Authorization": "Bearer " + localStorage.getItem("token") } });
      listar();
    }

    function editar(c) {
      document.getElementById("cita-id").value = c.id;
      document.getElementById("sol").value = c.solicitante_id;
      document.getElementById("tec").value = c.tecnico_id;
      document.getElementById("punto").value = c.punto_encuentro;
      document.getElementById("hora").value = c.hora_acordada;
      document.getElementById("estado").value = c.estado;
    }
  </script>
</body>
</html>
