<svg viewBox="0 0 1200 900" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
  </defs>

  <rect width="1200" height="900" fill="#f8fafc"/>

  <text x="600" y="42" text-anchor="middle" font-size="24" font-weight="700" fill="#0f172a">EmparejaTech — Arquitectura en capas (3 módulos)</text>
  <text x="600" y="66" text-anchor="middle" font-size="14" fill="#64748b">Proyecto Semestral · Aplicaciones Web II · TDI-601</text>

  <!-- Client -->
  <rect x="470" y="90" width="260" height="46" rx="8" fill="#0f172a"/>
  <text x="600" y="118" text-anchor="middle" font-size="15" fill="white" font-weight="600">Cliente (Postman / Frontend)</text>
  <line x1="600" y1="136" x2="600" y2="166" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Router + Auth middleware -->
  <rect x="330" y="168" width="540" height="56" rx="8" fill="#1e40af"/>
  <text x="600" y="192" text-anchor="middle" font-size="14" fill="white" font-weight="600">Router Chi — /api/v1</text>
  <text x="600" y="210" text-anchor="middle" font-size="12" fill="#dbeafe">Middleware: CORS → Auth (JWT Bearer) — responsabilidad grupal</text>
  <line x1="600" y1="224" x2="600" y2="252" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Auth service -->
  <rect x="450" y="254" width="300" height="42" rx="8" fill="#7c3aed"/>
  <text x="600" y="280" text-anchor="middle" font-size="13" fill="white" font-weight="600">AuthService — registro / login / bcrypt / JWT</text>

  <!-- 3 columns headers -->
  <g>
    <rect x="40"  y="320" width="360" height="40" rx="6" fill="#0ea5e9"/>
    <text x="220" y="345" text-anchor="middle" font-size="15" fill="white" font-weight="700">TÉCNICOS · Anthony Solórzano</text>

    <rect x="420" y="320" width="360" height="40" rx="6" fill="#16a34a"/>
    <text x="600" y="345" text-anchor="middle" font-size="15" fill="white" font-weight="700">INTERVENCIONES · Mario Soriano</text>

    <rect x="800" y="320" width="360" height="40" rx="6" fill="#ea580c"/>
    <text x="980" y="345" text-anchor="middle" font-size="15" fill="white" font-weight="700">SOLICITANTES · Jandry Cedeño</text>
  </g>

  <!-- Column: Tecnicos -->
  <g>
    <rect x="40" y="376" width="360" height="50" rx="6" fill="#e0f2fe" stroke="#0ea5e9" stroke-width="1.5"/>
    <text x="220" y="405" text-anchor="middle" font-size="13" fill="#0c4a6e">Handler: tecnico.go</text>

    <rect x="40" y="440" width="360" height="50" rx="6" fill="#e0f2fe" stroke="#0ea5e9" stroke-width="1.5"/>
    <text x="220" y="469" text-anchor="middle" font-size="13" fill="#0c4a6e">Service: TecnicoService (reglas de negocio)</text>

    <rect x="40" y="504" width="360" height="50" rx="6" fill="#e0f2fe" stroke="#0ea5e9" stroke-width="1.5"/>
    <text x="220" y="533" text-anchor="middle" font-size="13" fill="#0c4a6e">Repository: TecnicoRepository (GORM / sqlc)</text>

    <line x1="220" y1="426" x2="220" y2="440" stroke="#0ea5e9" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="220" y1="490" x2="220" y2="504" stroke="#0ea5e9" stroke-width="2" marker-end="url(#arrow)"/>

    <!-- entities -->
    <rect x="40" y="580" width="360" height="110" rx="6" fill="white" stroke="#94a3b8" stroke-width="1"/>
    <text x="220" y="600" text-anchor="middle" font-size="12" font-weight="700" fill="#0f172a">Entidades</text>
    <text x="220" y="620" text-anchor="middle" font-size="11" fill="#334155">Tecnico (1) ──&lt; ServicioOfrecido</text>
    <text x="220" y="638" text-anchor="middle" font-size="11" fill="#334155">Tecnico (1) ──&lt; HorarioTecnico</text>
    <text x="220" y="656" text-anchor="middle" font-size="11" fill="#334155">Tecnico ── referenciado por ──&gt; Cita</text>
  </g>

  <!-- Column: Intervenciones -->
  <g>
    <rect x="420" y="376" width="360" height="50" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
    <text x="600" y="405" text-anchor="middle" font-size="13" fill="#14532d">Handler: cita / puntoEncuentro / soporte</text>

    <rect x="420" y="440" width="360" height="50" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
    <text x="600" y="469" text-anchor="middle" font-size="13" fill="#14532d">Service: matching + máquina de estados</text>

    <rect x="420" y="504" width="360" height="50" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
    <text x="600" y="533" text-anchor="middle" font-size="13" fill="#14532d">Repository: Cita / Punto / Soporte (GORM)</text>

    <line x1="600" y1="426" x2="600" y2="440" stroke="#16a34a" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="600" y1="490" x2="600" y2="504" stroke="#16a34a" stroke-width="2" marker-end="url(#arrow)"/>

    <rect x="420" y="580" width="360" height="110" rx="6" fill="white" stroke="#94a3b8" stroke-width="1"/>
    <text x="600" y="600" text-anchor="middle" font-size="12" font-weight="700" fill="#0f172a">Entidades</text>
    <text x="600" y="620" text-anchor="middle" font-size="11" fill="#334155">Cita (solicitante_id, tecnico_id, punto)</text>
    <text x="600" y="638" text-anchor="middle" font-size="11" fill="#334155">Cita (1) ──&lt; Soporte (cierre)</text>
    <text x="600" y="656" text-anchor="middle" font-size="11" fill="#334155">PuntoEncuentro ── consultado por ──&gt; Cita</text>
  </g>

  <!-- Column: Solicitantes -->
  <g>
    <rect x="800" y="376" width="360" height="50" rx="6" fill="#ffedd5" stroke="#ea580c" stroke-width="1.5"/>
    <text x="980" y="405" text-anchor="middle" font-size="13" fill="#7c2d12">Handler: solicitante / dispositivo / ticket</text>

    <rect x="800" y="440" width="360" height="50" rx="6" fill="#ffedd5" stroke="#ea580c" stroke-width="1.5"/>
    <text x="980" y="469" text-anchor="middle" font-size="13" fill="#7c2d12">Service: SolicitanteService / TicketService</text>

    <rect x="800" y="504" width="360" height="50" rx="6" fill="#ffedd5" stroke="#ea580c" stroke-width="1.5"/>
    <text x="980" y="533" text-anchor="middle" font-size="13" fill="#7c2d12">Repository: GORM (Solicitante/Dispositivo/Ticket)</text>

    <line x1="980" y1="426" x2="980" y2="440" stroke="#ea580c" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="980" y1="490" x2="980" y2="504" stroke="#ea580c" stroke-width="2" marker-end="url(#arrow)"/>

    <rect x="800" y="580" width="360" height="110" rx="6" fill="white" stroke="#94a3b8" stroke-width="1"/>
    <text x="980" y="600" text-anchor="middle" font-size="12" font-weight="700" fill="#0f172a">Entidades</text>
    <text x="980" y="620" text-anchor="middle" font-size="11" fill="#334155">Usuario (1:1) ── Solicitante</text>
    <text x="980" y="638" text-anchor="middle" font-size="11" fill="#334155">Solicitante (1) ──&lt; Dispositivo</text>
    <text x="980" y="656" text-anchor="middle" font-size="11" fill="#334155">Dispositivo (1) ──&lt; TicketAyuda</text>
  </g>

  <!-- arrows down to shared DB -->
  <line x1="220" y1="690" x2="500" y2="740" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="600" y1="690" x2="600" y2="740" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="980" y1="690" x2="700" y2="740" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- shared DB -->
  <rect x="420" y="742" width="360" height="60" rx="8" fill="#0f172a"/>
  <text x="600" y="768" text-anchor="middle" font-size="14" fill="white" font-weight="700">Base de datos compartida</text>
  <text x="600" y="786" text-anchor="middle" font-size="12" fill="#cbd5e1">SQLite (local) / PostgreSQL (Docker Compose)</text>

  <!-- footer: docker -->
  <rect x="330" y="826" width="540" height="46" rx="8" fill="#334155"/>
  <text x="600" y="854" text-anchor="middle" font-size="13" fill="white" font-weight="600">Docker Compose: api (multi-stage) + db (Postgres) + seeders</text>
</svg>
